name: Auto-merge on bot approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-self:
    runs-on: ubuntu-latest
    if: |
      github.event.review.state == 'approved' &&
      github.event.review.user.login == 'github-actions[bot]'
    steps:
      - name: Verify approval is for HEAD + wait for other checks
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const reviewSha = context.payload.review.commit_id;
            const headSha = pr.head.sha;

            if (reviewSha !== headSha) {
              core.warning(`Bot approved ${reviewSha.slice(0,7)} but HEAD is now ${headSha.slice(0,7)}. Skipping.`);
              core.setOutput('result', 'stale');
              return;
            }

            if (pr.draft) {
              core.info('PR is draft, skipping auto-merge.');
              core.setOutput('result', 'draft');
              return;
            }

            const maxWaitMs = 180_000;
            const intervalMs = 10_000;
            const start = Date.now();

            while (Date.now() - start < maxWaitMs) {
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
              });

              const others = check_runs.filter(c => c.name !== 'auto-merge-self');
              const incomplete = others.filter(c => c.status !== 'completed');

              if (incomplete.length === 0) {
                const failed = others.filter(c =>
                  !['success', 'neutral', 'skipped'].includes(c.conclusion)
                );
                if (failed.length) {
                  core.setFailed(`Checks failed: ${failed.map(c => `${c.name}=${c.conclusion}`).join(', ')}`);
                  core.setOutput('result', 'checks_failed');
                  return;
                }
                core.setOutput('result', 'ok');
                return;
              }

              core.info(`Waiting on ${incomplete.length} check(s): ${incomplete.map(c => c.name).join(', ')}`);
              await new Promise(r => setTimeout(r, intervalMs));
            }

            core.setFailed('Timed out after 3 min waiting for checks.');
            core.setOutput('result', 'timeout');

      - name: Merge + delete branch
        if: steps.gate.outputs.result == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let mergeable = null;
            for (let attempt = 0; attempt < 6; attempt++) {
              const fresh = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
              mergeable = fresh.data.mergeable;
              if (mergeable === true || mergeable === false) break;
              await new Promise(r => setTimeout(r, 5_000));
            }

            if (mergeable !== true) {
              const msg = mergeable === false
                ? 'PR has merge conflicts. Resolve and push to retry.'
                : 'Could not confirm PR is mergeable after 30s. Refusing.';
              await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body: `🤖 Auto-merge skipped: ${msg}` });
              core.setFailed(msg);
              return;
            }

            try {
              await github.rest.pulls.merge({ owner, repo, pull_number: pr.number, merge_method: 'merge' });
            } catch (e) {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body: `🤖 Auto-merge failed: ${e.message}` }).catch(() => {});
              core.setFailed(`Merge failed: ${e.message}`);
              return;
            }

            const cleanupErrors = [];
            if (pr.head.repo.full_name === `${owner}/${repo}`) {
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${pr.head.ref}` });
              } catch (e) {
                cleanupErrors.push(`branch delete: ${e.message}`);
              }
            }

            const body = cleanupErrors.length === 0
              ? '🤖 Auto-merged: Claude Haiku approved + all checks passed. Branch deleted.'
              : `🤖 Auto-merged — cleanup issues: ${cleanupErrors.join('; ')}`;
            await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body }).catch(() => {});
